<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscription Confirmed — iSard App</title>
    <link rel="icon" type="image/png" href="/iSard_icon.png">
    <link rel="stylesheet" href="/css/header.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #EFF2F7;
            color: #1a1a2e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 24px;
            text-align: center;
        }

        .app-icon {
            width: 140px;
            height: 140px;
            border-radius: 28px;
            margin-bottom: 32px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 40px;
        }

        .success {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 32px;
        }

        .message {
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 8px;
            color: #444;
        }

        .testflight-link {
            font-size: 1rem;
            color: #1a1a2e;
            margin-bottom: 32px;
        }

        .testflight-link a {
            color: #2563eb;
            text-decoration: underline;
        }

        .testflight-link a:hover {
            color: #1d4ed8;
        }

        footer {
            border-top: 1px solid #ccc;
            padding: 24px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer-logo {
            height: 32px;
            width: auto;
        }

        .privacy-link {
            color: #1a1a2e;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .privacy-link:hover {
            text-decoration: underline;
        }

        .cookie-banner {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #fff;
            border-top: 1px solid #e0e0e0;
            padding: 16px 24px;
            z-index: 9999;
            box-shadow: 0 -2px 8px rgba(0,0,0,0.08);
        }

        .cookie-content {
            max-width: 960px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        .cookie-content p {
            font-size: 0.85rem;
            line-height: 1.5;
            color: #444;
            margin: 0;
        }

        .cookie-content a {
            color: #1a1a2e;
            text-decoration: underline;
        }

        .cookie-buttons {
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }

        .cookie-accept, .cookie-settings-btn, .cookie-save {
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
        }

        .cookie-accept {
            background: #1a1a2e;
            color: #fff;
            border: none;
        }

        .cookie-settings-btn {
            background: transparent;
            color: #1a1a2e;
            border: 1px solid #ccc;
        }

        .cookie-settings-btn:hover {
            border-color: #999;
        }

        .cookie-settings-content {
            max-width: 960px;
            margin: 0 auto;
        }

        .cookie-settings-title {
            font-size: 0.95rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .cookie-option {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
            gap: 16px;
        }

        .cookie-option-text {
            display: flex;
            gap: 12px;
            align-items: baseline;
        }

        .cookie-option-name {
            font-size: 0.85rem;
            font-weight: 600;
            white-space: nowrap;
        }

        .cookie-option-desc {
            font-size: 0.8rem;
            color: #666;
        }

        .cookie-toggle {
            position: relative;
            width: 44px;
            height: 24px;
            flex-shrink: 0;
        }

        .cookie-toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .cookie-slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            border-radius: 24px;
            transition: 0.2s;
        }

        .cookie-slider::before {
            content: "";
            position: absolute;
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: #fff;
            border-radius: 50%;
            transition: 0.2s;
        }

        .cookie-toggle input:checked + .cookie-slider {
            background-color: #2563eb;
        }

        .cookie-toggle input:checked + .cookie-slider::before {
            transform: translateX(20px);
        }

        .cookie-toggle.disabled .cookie-slider {
            cursor: default;
            opacity: 0.7;
        }

        .cookie-save {
            margin-top: 12px;
            background: #1a1a2e;
            color: #fff;
            border: none;
        }

        @media (max-width: 600px) {
            .app-icon {
                width: 100px;
                height: 100px;
                border-radius: 20px;
            }

            h1 {
                font-size: 1.4rem;
            }

            .success {
                font-size: 1.1rem;
            }

            footer {
                padding: 20px 24px;
            }

            .cookie-content {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="content">
        <img src="/iSard_icon.png" alt="iSard App Icon" class="app-icon">
        <h1 data-i18n="heading">¡Gracias por suscribirte!</h1>
        <p class="success" data-i18n="success">&#x2705; Te has suscrito correctamente</p>
        <p class="message" data-i18n="message">Aquí tienes el enlace de TestFlight para descargar la versión beta de iSard:</p>
        <p class="testflight-link">&#x1F449; <a href="https://testflight.apple.com/join/sGNujsQW">https://testflight.apple.com/join/sGNujsQW</a></p>
    </div>
    <footer>
        <a href="https://www.isard.app"><img src="/iSardLogoBlack.svg" alt="iSard" class="footer-logo"></a>
        <a href="/privacy" class="privacy-link" data-i18n="privacy">Política de Privacidad</a>
    </footer>

    <script src="/js/header.js"></script>
    <script src="/js/i18n.js"></script>
    <script>
        i18nInit({
            es: {
                heading: '¡Gracias por suscribirte!',
                success: '&#x2705; Te has suscrito correctamente',
                message: 'Aquí tienes el enlace de TestFlight para descargar la versión beta de iSard:',
                privacy: 'Política de Privacidad'
            },
            ca: {
                heading: 'Gràcies per subscriure\'t!',
                success: '&#x2705; T\'has subscrit correctament',
                message: 'Aquí tens l\'enllaç de TestFlight per descarregar la versió beta d\'iSard:',
                privacy: 'Política de Privacitat'
            },
            en: {
                heading: 'Thank you for subscribing!',
                success: '&#x2705; You have subscribed successfully',
                message: 'Here is the TestFlight link to download iSard app beta version:',
                privacy: 'Privacy Policy'
            }
        });
    </script>
    <script src="/js/cookies.js"></script>
</body>
</html>
