<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — iSard App</title>
    <link rel="icon" type="image/png" href="/iSard_icon.png">
    <link rel="stylesheet" href="/css/header.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #EFF2F7;
            color: #1a1a2e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 24px 60px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 12px;
            text-align: center;
        }

        .subtitle {
            font-size: 1rem;
            color: #444;
            margin-bottom: 32px;
            text-align: center;
            max-width: 480px;
            line-height: 1.5;
        }

        .email-line {
            font-size: 0.95rem;
            color: #666;
            margin-bottom: 32px;
            text-align: center;
        }

        .email-line a {
            color: #1a1a2e;
            font-weight: 600;
            text-decoration: none;
        }

        .email-line a:hover {
            text-decoration: underline;
        }

        .chat-container {
            width: 100%;
            max-width: 600px;
            height: 520px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            background: #fff;
        }

        .chat-consent {
            width: 100%;
            max-width: 600px;
            background: #fff;
            border-radius: 12px;
            padding: 40px 32px;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        .chat-consent p {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #444;
            margin-bottom: 20px;
        }

        .chat-consent button {
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 600;
            padding: 12px 28px;
            border-radius: 8px;
            border: none;
            background: #1a1a2e;
            color: #fff;
            cursor: pointer;
        }

        .chat-consent button:hover {
            background: #2a2a4e;
        }

        footer {
            border-top: 1px solid #ccc;
            padding: 24px 40px 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer-logo {
            height: 32px;
            width: auto;
        }

        .privacy-link {
            color: #1a1a2e;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .privacy-link:hover {
            text-decoration: underline;
        }

        .cookie-banner {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #fff;
            border-top: 1px solid #e0e0e0;
            padding: 16px 24px;
            z-index: 9999;
            box-shadow: 0 -2px 8px rgba(0,0,0,0.08);
        }

        .cookie-content {
            max-width: 960px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        .cookie-content p {
            font-size: 0.85rem;
            line-height: 1.5;
            color: #444;
            margin: 0;
        }

        .cookie-content a {
            color: #1a1a2e;
            text-decoration: underline;
        }

        .cookie-buttons {
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }

        .cookie-accept, .cookie-settings-btn, .cookie-save {
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
        }

        .cookie-accept {
            background: #1a1a2e;
            color: #fff;
            border: none;
        }

        .cookie-settings-btn {
            background: transparent;
            color: #1a1a2e;
            border: 1px solid #ccc;
        }

        .cookie-settings-btn:hover {
            border-color: #999;
        }

        .cookie-settings-content {
            max-width: 960px;
            margin: 0 auto;
        }

        .cookie-settings-title {
            font-size: 0.95rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .cookie-option {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
            gap: 16px;
        }

        .cookie-option-text {
            display: flex;
            gap: 12px;
            align-items: baseline;
        }

        .cookie-option-name {
            font-size: 0.85rem;
            font-weight: 600;
            white-space: nowrap;
        }

        .cookie-option-desc {
            font-size: 0.8rem;
            color: #666;
        }

        .cookie-toggle {
            position: relative;
            width: 44px;
            height: 24px;
            flex-shrink: 0;
        }

        .cookie-toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .cookie-slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            border-radius: 24px;
            transition: 0.2s;
        }

        .cookie-slider::before {
            content: "";
            position: absolute;
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: #fff;
            border-radius: 50%;
            transition: 0.2s;
        }

        .cookie-toggle input:checked + .cookie-slider {
            background-color: #2563eb;
        }

        .cookie-toggle input:checked + .cookie-slider::before {
            transform: translateX(20px);
        }

        .cookie-toggle.disabled .cookie-slider {
            cursor: default;
            opacity: 0.7;
        }

        .cookie-save {
            margin-top: 12px;
            background: #1a1a2e;
            color: #fff;
            border: none;
        }

        @media (max-width: 600px) {
            .content {
                padding: 24px 16px 40px;
            }

            h1 {
                font-size: 1.4rem;
            }

            .chat-container {
                height: 460px;
                border-radius: 8px;
            }

            footer {
                padding: 20px 24px 80px;
            }

            .cookie-content {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="content">
        <h1 data-i18n="heading">Contacto</h1>
        <p class="subtitle" data-i18n="subtitle">Escríbenos por el chat o envíanos un email. Te responderemos lo antes posible.</p>
        <p class="email-line" data-i18n="email_label">Email: <a href="#" id="contact-email-link"><span id="contact-email"></span></a></p>
        <div id="chat-area"></div>
    </div>

    <footer>
        <a href="https://www.isard.app"><img src="/iSardLogoBlack.svg" alt="iSard" class="footer-logo"></a>
        <a href="/privacy" class="privacy-link" data-i18n="privacy">Política de Privacidad</a>
    </footer>

    <script>
        (function(){
            var u='hola',d='isard.app',e=u+'@'+d;
            var span = document.getElementById('contact-email');
            var link = document.getElementById('contact-email-link');
            if(span) span.textContent = e;
            if(link) link.href = 'mai'+'lto:'+e;
        })();
    </script>
    <script src="/js/header.js"></script>
    <script src="/js/i18n.js"></script>
    <script>
        var consentTexts = {
            es: {
                consentMsg: 'Para usar el chat necesitamos tu consentimiento para cargar el widget de Brevo Conversations.',
                consentBtn: 'Aceptar y abrir chat'
            },
            ca: {
                consentMsg: 'Per usar el xat necessitem el teu consentiment per carregar el widget de Brevo Conversations.',
                consentBtn: 'Acceptar i obrir xat'
            },
            en: {
                consentMsg: 'To use the chat we need your consent to load the Brevo Conversations widget.',
                consentBtn: 'Accept and open chat'
            }
        };

        function getLang() {
            var stored = localStorage.getItem('isard-lang');
            return (stored && consentTexts[stored]) ? stored : 'es';
        }

        function loadBrevoFrame() {
            var area = document.getElementById('chat-area');
            area.innerHTML = '<div id="conversations-wrapper" class="chat-container"></div>';
            window.BrevoConversationsSetup = {
                mode: 'frame',
                injectTo: 'conversations-wrapper',
                locale: getLang()
            };
            window.BrevoConversationsID = '69e161ed30e28454ca00bd4d';
            window.BrevoConversations = window.BrevoConversations || function() {
                (window.BrevoConversations.q = window.BrevoConversations.q || []).push(arguments);
            };
            var s = document.createElement('script');
            s.async = true;
            s.src = 'https://conversations-widget.brevo.com/brevo-conversations.js';
            document.head.appendChild(s);
        }

        function showConsentBox() {
            var lang = getLang();
            var t = consentTexts[lang];
            var area = document.getElementById('chat-area');
            area.innerHTML =
                '<div class="chat-consent">' +
                    '<p>' + t.consentMsg + '</p>' +
                    '<button id="consent-btn">' + t.consentBtn + '</button>' +
                '</div>';
            document.getElementById('consent-btn').addEventListener('click', function() {
                localStorage.setItem('isard-cookies', 'accepted');
                loadBrevoFrame();
            });
        }

        var consent = localStorage.getItem('isard-cookies');
        if (consent === 'accepted') {
            loadBrevoFrame();
        } else {
            showConsentBox();
        }

        window.onLangChange = function(lang) {
            var consent = localStorage.getItem('isard-cookies');
            if (consent !== 'accepted') {
                showConsentBox();
            }
        };

        i18nInit({
            es: {
                heading: 'Contacto',
                subtitle: 'Escríbenos por el chat o envíanos un email. Te responderemos lo antes posible.',
                email_label: 'Email: <a href="#" id="contact-email-link"><span id="contact-email"></span></a>',
                privacy: 'Política de Privacidad'
            },
            ca: {
                heading: 'Contacte',
                subtitle: 'Escriu-nos pel xat o envia\'ns un email. Et respondrem el més aviat possible.',
                email_label: 'Email: <a href="#" id="contact-email-link"><span id="contact-email"></span></a>',
                privacy: 'Política de Privacitat'
            },
            en: {
                heading: 'Contact',
                subtitle: 'Write to us via chat or send us an email. We\'ll get back to you as soon as possible.',
                email_label: 'Email: <a href="#" id="contact-email-link"><span id="contact-email"></span></a>',
                privacy: 'Privacy Policy'
            }
        });

        // Re-obfuscate email after i18n replaces innerHTML
        (function(){
            var u='hola',d='isard.app',e=u+'@'+d;
            var span = document.getElementById('contact-email');
            var link = document.getElementById('contact-email-link');
            if(span) span.textContent = e;
            if(link) link.href = 'mai'+'lto:'+e;
        })();
    </script>
</body>
</html>
