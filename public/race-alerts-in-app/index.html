<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Race Alerts — iSard App</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        body {
            display: flex;
            flex-direction: column;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        .benefits {
            list-style: none;
            margin: 0;
            padding: 24px 16px 0;
        }

        .benefits li {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            color: #fff;
            font-size: 1.05rem;
            line-height: 1.4;
            margin-bottom: 14px;
        }

        .benefits svg {
            flex-shrink: 0;
            width: 24px;
            height: 24px;
            margin-top: 1px;
        }

        /* The form lives in a cross-origin iframe, so its internal padding
           (.sib-form 12px + .sib-form-block 16px per side) can't be styled
           from here. Crop 12px per side so content sits ~16px from the
           edges, matching the app's margins. */
        iframe {
            display: block;
            flex: 1;
            min-height: 0;
            width: calc(100% + 24px);
            margin-left: -12px;
            border: none;
        }
    </style>
</head>
<body>
    <ul class="benefits">
        <li>
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><circle cx="12" cy="12" r="12" fill="#D2F543"/><path d="M7 12.5l3.2 3.2L17 8.5" stroke="#000" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span>Get a monthly email with new races and registration openings.</span>
        </li>
        <li>
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><circle cx="12" cy="12" r="12" fill="#D2F543"/><path d="M7 12.5l3.2 3.2L17 8.5" stroke="#000" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span>Be the first to know when registrations open for races near you!</span>
        </li>
        <li>
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><circle cx="12" cy="12" r="12" fill="#D2F543"/><path d="M7 12.5l3.2 3.2L17 8.5" stroke="#000" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span>One email per month. No spam. Unsubscribe anytime.</span>
        </li>
    </ul>
    <iframe
        src="https://e9c1e8e2.sibforms.com/v2/serve/MUIFAOhGN5KSP7i1cJh87f19yvTVbcn8Wc9AV8rPCvoFaYTpQhJfpUYFo1GdyadeQFYbgkHWX0bUtCxEjSDTers97XSjQB58mLVD3UoNkMngg6AX5tuszQUIQBrWCRpTdH5vLgwC200_zeenZbJhGqxRZh9AjwpTUx2df6M8f0f4TNN8-P9vNsnyneAzirXYYS2K9Pym_eJbmnO0fg=="
        frameborder="0"
        scrolling="auto"
        allowfullscreen
    ></iframe>
</body>
</html>
