<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscription Confirmed — iSard App</title>
    <link rel="icon" type="image/png" href="/iSard_icon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #EFF2F7;
            color: #1a1a2e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
            padding: 60px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .app-icon {
            width: 120px;
            height: 120px;
            border-radius: 24px;
            margin-bottom: 24px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .message {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 32px;
            color: #444;
        }

        .back-link {
            display: inline-block;
            background: #1a1a2e;
            color: #fff;
            text-decoration: none;
            padding: 14px 32px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
        }

        .back-link:hover {
            background: #2a2a4e;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="/iSard_icon.png" alt="iSard App Icon" class="app-icon">
        <h1>You're all set!</h1>
        <p class="message">
            Your subscription has been confirmed. Check your inbox for the TestFlight link to download iSard.
        </p>
        <a href="/" class="back-link">Back to iSard.app</a>
    </div>
</body>
</html>
