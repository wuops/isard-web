<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iSard App — Running, Hiking & Cycling Tracker</title>
    <meta name="description" content="iSard is a running, hiking and cycling tracker app that let you record workout activities, design shareable cards, and export replay 3D animation videos of your routes.">
    <link rel="icon" type="image/png" href="/iSard_icon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #EFF2F7;
            color: #1a1a2e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .lang-nav {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            padding: 12px 24px 0;
        }

        .lang-select {
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 6px 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            background: #fff;
            color: #1a1a2e;
            cursor: pointer;
            outline: none;
        }

        .lang-select:hover {
            border-color: #999;
        }

        .container {
            max-width: 700px;
            width: 100%;
            padding: 20px 24px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-icon {
            width: 160px;
            height: 160px;
            border-radius: 32px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 24px;
            text-align: center;
        }

        .tagline {
            font-size: 1.15rem;
            font-weight: 600;
            line-height: 1.6;
            text-align: center;
            margin-bottom: 40px;
            max-width: 580px;
        }

        .form-card {
            background: #fff;
            border-radius: 12px;
            padding: 0;
            width: 100%;
            max-width: 580px;
            overflow: hidden;
        }

        .form-card iframe {
            display: block;
            width: 100%;
            border: none;
        }

        footer {
            border-top: 1px solid #ccc;
            padding: 24px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .footer-logo {
            height: 32px;
            width: auto;
        }

        .privacy-link {
            color: #1a1a2e;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .privacy-link:hover {
            text-decoration: underline;
        }

        .cookie-banner {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #fff;
            border-top: 1px solid #ccc;
            padding: 16px 24px;
            z-index: 9999;
            box-shadow: 0 -2px 8px rgba(0,0,0,0.1);
        }

        .cookie-content {
            max-width: 700px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .cookie-content p {
            font-size: 0.85rem;
            line-height: 1.5;
            color: #444;
            margin: 0;
        }

        .cookie-content a {
            color: #2563eb;
            text-decoration: underline;
        }

        .cookie-buttons {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .cookie-accept, .cookie-reject {
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            border: none;
        }

        .cookie-accept {
            background: #1a1a2e;
            color: #fff;
        }

        .cookie-reject {
            background: transparent;
            color: #666;
            border: 1px solid #ccc;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px 16px 32px;
            }

            .app-icon {
                width: 120px;
                height: 120px;
                border-radius: 24px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .tagline {
                font-size: 1rem;
            }

            footer {
                padding: 20px 24px;
            }

            .cookie-content {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="/iSard_icon.png" alt="iSard App Icon" class="app-icon">
        <h1>iSard App</h1>
        <p class="tagline" data-i18n="tagline">
            iSard es una app de running, senderismo y ciclismo que te permite
            registrar actividades deportivas, diseñar tarjetas compartibles y
            exportar vídeos de animación 3D de tus rutas.
        </p>
        <div class="form-card">
            <iframe
                width="540"
                height="805"
                src="https://e9c1e8e2.sibforms.com/serve/MUIFAEQVtlT1--gMGkHq44Ep6zGqHG-XMFOiy08_Z8tf2Ghv_4Gc3i5En8jbsJT7T8SLE9PwWtcs1PGt-LYy2R3juq5wZ9w-84OJR2IsmNdefszBpW_OEuZ5OeUJOl6DdzHRFby5UuTNodC22vCRc8BtnBJ-kbqDOYaaBL8Pcm9NT2_MLLOvkZ7nwA86tZ0gd0wg5DcUWAfqT_YCuQ=="
                frameborder="0"
                scrolling="auto"
                allowfullscreen
                style="display:block;margin-left:auto;margin-right:auto;max-width:100%;"
            ></iframe>
        </div>
    </div>

    <footer>
        <a href="https://www.isard.app"><img src="/iSardLogoBlack.svg" alt="iSard" class="footer-logo"></a>
        <a href="/privacy" class="privacy-link" data-i18n="privacy">Política de Privacidad</a>
    </footer>

    <script src="/js/i18n.js"></script>
    <script>
        i18nInit({
            es: {
                tagline: 'iSard es una app de running, senderismo y ciclismo que te permite registrar actividades deportivas, diseñar tarjetas compartibles y exportar vídeos de animación 3D de tus rutas.',
                privacy: 'Política de Privacidad'
            },
            ca: {
                tagline: 'iSard és una app de running, senderisme i ciclisme que et permet registrar activitats esportives, dissenyar targetes compartibles i exportar vídeos d\'animació 3D de les teves rutes.',
                privacy: 'Política de Privacitat'
            },
            en: {
                tagline: 'iSard is a running, hiking and cycling tracker app that lets you record workout activities, design shareable cards, and export replay 3D animation videos of your routes.',
                privacy: 'Privacy Policy'
            }
        });
    </script>

    <script src="/js/cookies.js"></script>
</body>
</html>
